spring:
  application:
    name: gateway-service
  cloud:
    gateway:
        routes:
          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/api/users/**

          - id: ai-service
            uri: lb://AI-SERVICE
            predicates:
              - Path=/api/recommendations/**

          - id: activity-service
            uri: lb://ACTIVITY-SERVICE
            predicates:
              - Path=/api/activities/**

server:
  port: 8083


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/



